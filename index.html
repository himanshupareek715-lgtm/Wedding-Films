<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moving Forward Films | Wedding Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:24px;
background:
linear-gradient(135deg,#fff6f8 0%,#fdecef 45%,#fffaf4 100%);
animation:fadeIn .8s ease;
}
.card{
max-width:430px;
width:100%;
background:rgba(255,255,255,.55);
backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.45);
border-radius:34px;
padding:34px 28px;
box-shadow:0 20px 60px rgba(171,120,135,.18),0 8px 24px rgba(0,0,0,.06);
text-align:center;
}
.logo{font-size:56px}
h1{margin:12px 0 8px;font-size:2rem;font-weight:700;color:#2f2a2c}
p{color:#6e6367;line-height:1.7;font-size:.97rem}
.btn{
display:block;
text-decoration:none;
padding:17px;
margin-top:20px;
border-radius:18px;
font-weight:600;
transition:all .3s ease;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(0,0,0,.12)}
.instagram{
background:linear-gradient(135deg,#f58529,#dd2a7b,#8134af,#515bd4);
color:#fff;
}
.gallery{
background:#181818;
color:#fff;
opacity:.45;
pointer-events:none;
}
.gallery.active{opacity:1;pointer-events:auto}
.code{
margin-top:26px;
padding:22px;
border-radius:22px;
background:rgba(255,255,255,.6);
border:1px solid rgba(255,255,255,.5);
box-shadow:0 8px 24px rgba(0,0,0,.05);
}
.code h3{color:#3b3436}
#joinCode{
font-size:30px;
font-weight:700;
letter-spacing:5px;
margin:12px 0;
color:#1d1d1d;
}
button{
padding:13px 20px;
border:none;
border-radius:14px;
background:#111;
color:#fff;
font-weight:600;
cursor:pointer;
transition:.3s;
}
button:hover{transform:translateY(-2px)}
.footer{margin-top:24px;font-size:13px;color:#80757a}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="card">
<div class="logo">📸</div>
<h1>Moving Forward Films</h1>
<p>Before accessing your wedding photos, please follow us on Instagram.</p>
<a class="btn instagram" href="https://www.instagram.com/movingforwardfilms.in?igsh=MW12b3pycndjNWwzbg==" target="_blank" onclick="unlockGallery()">📲 Follow on Instagram</a>
<a id="galleryBtn" class="btn gallery" href="https://kwikpic-in.app.link/" target="_blank">📷 Find My Photos</a>
<div class="code">
<h3>Join Code</h3>
<div id="joinCode">543DCU</div>
<button onclick="copyCode()">📋 Copy Join Code</button>
</div>
<div class="footer">Powered by ❤️ Moving Forward Films</div>
</div>
<script>
function unlockGallery(){setTimeout(function(){document.getElementById("galleryBtn").classList.add("active");},1500);}
function copyCode(){
navigator.clipboard.writeText("543DCU");
const b=document.querySelector("button");
b.style.transform="scale(1.04)";
b.innerHTML="✅ Copied!";
setTimeout(()=>{
b.innerHTML="📋 Copy Join Code";
b.style.transform="scale(1)";
},1800);
}
</script>
</body>
</html>
